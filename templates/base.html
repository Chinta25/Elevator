{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <!-- SEO Meta Tags -->

    <meta name="description"
          content="Elevate Lifts provides premium elevator installation, modernization, maintenance, and lift solutions for residential and commercial buildings.">

    <meta name="keywords"
          content="Elevator, Lifts, Passenger Lift, Hospital Lift, Home Lift, Elevator Installation, Hyderabad Lifts">

    <meta name="author"
          content="Elevate Lifts">

    <title>
        {% block title %}
            Elevate Lifts
        {% endblock %}
    </title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Custom CSS -->

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body>

    {% include 'navbar.html' %}

    {% block content %}
    {% endblock %}

    {% include 'footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
