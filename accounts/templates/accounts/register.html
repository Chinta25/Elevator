{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}
Register
{% endblock %}

{% block content %}

<section class="container py-5 mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow">

                <div class="card-body p-5">

                    <h2 class="text-center mb-4">
                        Create Account
                    </h2>

                    <form method="POST">

                        {% csrf_token %}

                        {{ form|crispy }}

                        <button class="btn btn-primary w-100">
                            Register
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
